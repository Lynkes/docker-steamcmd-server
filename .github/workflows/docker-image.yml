name: Docker CI/CD

permissions:
  contents: read
  packages: write

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  # ── Base image (steamcmd_docker:latest / :<branch>) ────────────────────────
  build-base:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-base-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-base-

      - name: Compute tags
        id: tags
        run: |
          IMAGE=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG=latest
          else
            TAG=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          fi
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"     >> $GITHUB_OUTPUT

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        run: |
          docker buildx build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --tag ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.tag }} \
            --output=type=docker \
            .

      - name: Push base image to GHCR
        if: github.event_name == 'push'
        run: docker push ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.tag }}

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ── Wine image (steamcmd_docker:wine / :<branch>-wine) ─────────────────────
  # Runs only on push (base must be in GHCR first). Extends the base image with
  # Wine pre-installed so Wine-based game containers skip the ~400 MB download.
  build-wine:
    runs-on: ubuntu-latest
    needs: build-base
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-wine-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-wine-

      - name: Compute tags
        id: tags
        run: |
          IMAGE=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "wine_tag=${IMAGE}:wine"              >> $GITHUB_OUTPUT
            echo "base_image=${IMAGE}:latest"          >> $GITHUB_OUTPUT
          else
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
            echo "wine_tag=${IMAGE}:${BRANCH}-wine"    >> $GITHUB_OUTPUT
            echo "base_image=${IMAGE}:${BRANCH}"       >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build wine image
        run: |
          docker buildx build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --build-arg BASE_IMAGE=${{ steps.tags.outputs.base_image }} \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --tag ${{ steps.tags.outputs.wine_tag }} \
            --output=type=docker \
            -f Dockerfile.wine \
            .

      - name: Push wine image to GHCR
        run: docker push ${{ steps.tags.outputs.wine_tag }}

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
